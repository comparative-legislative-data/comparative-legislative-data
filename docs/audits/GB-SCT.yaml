# Scottish Parliament (GB-SCT) Audit Blueprint
# Comparative Legislative Data Platform — Version 2.5.0
# Scientific Classification: Definitive Constants, Closed Enums, Result-Dependent Dynamic, Binary Flags, Persistent Identifiers
# Dual Entity Model: CanonicalBill (Macro Level) & CanonicalAmendment (Micro Level)

assembly_metadata:
  jurisdiction_code: "GB-SCT"
  name: "Scottish Parliament"
  native_name: "Pàrlamaid na h-Alba"
  location: "Holyrood, Edinburgh, Scotland"
  chamber_type: "DEVOLVED_UNICAMERAL"
  statutory_seats_total: 129
  presiding_officer_neutral_count: 1
  official_portal_url: "https://www.parliament.scot"

audited_terms:
  - term_code: "S6"
    name: "Session 6"
    date_start: "2021-05-13"
    date_end: "2026-05-07"
    executive_periods:
      - period: "2021-08-31 to 2024-04-25"
        government_type: "COOPERATION_AGREEMENT" # SNP + Scottish Greens (Bute House Agreement)
        parlgov_cabinet_id: "GB-SCT-CAB-2021"
      - period: "2024-04-25 to Present"
        government_type: "SINGLE_PARTY_MINORITY" # SNP
        parlgov_cabinet_id: "GB-SCT-CAB-2024"

native_data_sources:
  - id: "sct_api_bills"
    name: "Official Scottish Parliament Open Data Bills API"
    url: "https://data.parliament.scot/api/bills"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_api_members"
    name: "Official Scottish Parliament MSP Roster API"
    url: "https://data.parliament.scot/api/members"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_api_votes"
    name: "Official Holyrood Official Report Voting Feed"
    url: "https://data.parliament.scot/api/votes"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "phd_hand_coded_amendments"
    name: "Scottish Parliament PhD Hand-Coded Amendment Dataset"
    url: "https://doi.org/10.5281/zenodo.1234567"
    format: "CSV/Parquet"
    provenance_tier: "DERIVED_HUMAN_CODED"

# --- ENTITY 1: MACRO BILL LEVEL VARIABLES ---
bill_entity_variables:
  # Definitive Constants
  - key: "jurisdiction_code"
    scientific_category: "DEFINITIVE_CONSTANT"
    type: "String (ISO 3166-2)"
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "jurisdiction_code"

  - key: "statutory_seats_total"
    scientific_category: "DEFINITIVE_CONSTANT"
    type: "Integer"
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "statutory_seats_total"

  # Closed-Set Enums
  - key: "government_type"
    scientific_category: "CLOSED_ENUM"
    allowed_values:
      - "SINGLE_PARTY_MAJORITY"
      - "SINGLE_PARTY_MINORITY"
      - "FORMAL_COALITION_MAJORITY"
      - "FORMAL_COALITION_MINORITY"
      - "CONFIDENCE_AND_SUPPLY"
      - "COOPERATION_AGREEMENT" # e.g. Bute House Agreement
      - "CARETAKER_TECHNOCRATIC"
    provenance_tier: "LINKED_EXTERNAL_AUTHORITY"
    canonical_mapping: "government_type"

  - key: "initiator_type"
    scientific_category: "CLOSED_ENUM"
    allowed_values:
      - "EXECUTIVE"            # Government Bill
      - "INDIVIDUAL_MEMBER"    # Member's Bill
      - "COMMITTEE"            # Committee Bill
      - "PRIVATE_ORGANISATION" # Private Bill / Hybrid Bill
    provenance_tier: "DERIVED_DETERMINISTIC"
    canonical_mapping: "initiator_type"

  - key: "final_status"
    scientific_category: "CLOSED_ENUM"
    allowed_values:
      - "ENACTED"    # Passed Stage 3 and received Royal Assent
      - "DEFEATED"   # Defeated at Stage 1 or Stage 3 vote
      - "WITHDRAWN"  # Withdrawn by sponsor
      - "LAPSED"     # Lapsed at dissolution of Session
      - "PENDING"    # Currently undergoing consideration
      - "VETOED"     # Blocked by Section 35 Scotland Act Order
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "final_status"

  # Result-Dependent Dynamic Measures
  - key: "date_introduced"
    scientific_category: "RESULT_DEPENDENT_DYNAMIC"
    type: "Date (ISO 8601)"
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "date_introduced"

  - key: "stage_1_lead_committee_report_date"
    scientific_category: "RESULT_DEPENDENT_DYNAMIC"
    type: "Date (ISO 8601)"
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "stage_milestones[0].date_end"

  - key: "bill_as_introduced_word_count"
    scientific_category: "RESULT_DEPENDENT_DYNAMIC"
    type: "Integer"
    provenance_tier: "DERIVED_DETERMINISTIC"
    canonical_mapping: "word_count_introduced"

  - key: "bill_as_amended_stage_2_word_count"
    scientific_category: "RESULT_DEPENDENT_DYNAMIC"
    type: "Integer"
    provenance_tier: "DERIVED_DETERMINISTIC"
    canonical_mapping: "word_count_post_committee"

  - key: "bill_as_enacted_word_count"
    scientific_category: "RESULT_DEPENDENT_DYNAMIC"
    type: "Integer"
    provenance_tier: "DERIVED_DETERMINISTIC"
    canonical_mapping: "word_count_enacted"

  - key: "duration_sitting_days"
    scientific_category: "RESULT_DEPENDENT_DYNAMIC"
    type: "Integer"
    provenance_tier: "DERIVED_DETERMINISTIC"
    canonical_mapping: "duration_sitting_days"

  - key: "amendments_tabled_stage_2_count"
    scientific_category: "RESULT_DEPENDENT_DYNAMIC"
    type: "Integer"
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "amendments_tabled_count"

  # Binary Flags
  - key: "financial_resolution_motion_flag"
    scientific_category: "BINARY_FLAG"
    type: "Boolean"
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "financial_resolution_invoked_flag"

  - key: "emergency_bill_declaration_flag"
    scientific_category: "BINARY_FLAG"
    type: "Boolean"
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "emergency_procedure_flag"

  - key: "section_35_order_triggered_flag"
    scientific_category: "BINARY_FLAG"
    type: "Boolean"
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "inter_governmental_veto_flag"

# --- ENTITY 2: MICRO AMENDMENT LEVEL VARIABLES ---
amendment_entity_variables:
  - key: "local_amendment_number"
    name: "Holyrood Marshalled List Amendment Number"
    scientific_category: "RESULT_DEPENDENT_DYNAMIC"
    type: "String"
    provenance_tier: "NATIVE_DIRECT"
    description: "Native amendment number on Holyrood Marshalled List (e.g. Amd 42, LOD 104)."
    canonical_mapping: "local_amendment_number"

  - key: "stage_canonical"
    name: "Stage of Consideration"
    scientific_category: "CLOSED_ENUM"
    allowed_values:
      - "COMMITTEE_STAGE" # Holyrood Stage 2
      - "REPORT_STAGE"
      - "FINAL_PASSAGE"   # Holyrood Stage 3
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "stage_canonical"

  - key: "sponsor_member_id"
    name: "Lead MSP Sponsor ID"
    scientific_category: "PERSISTENT_IDENTIFIER"
    type: "String (Wikidata QID)"
    provenance_tier: "LINKED_EXTERNAL_AUTHORITY"
    canonical_mapping: "sponsor_member_id"

  - key: "sponsor_governance_role"
    name: "Sponsor Institutional Alignment"
    scientific_category: "CLOSED_ENUM"
    allowed_values:
      - "EXECUTIVE_MINISTER"
      - "GOVERNING_BACKBENCH"
      - "OPPOSITION_MEMBER"
      - "CROSS_PARTY"
    provenance_tier: "DERIVED_DETERMINISTIC"
    canonical_mapping: "sponsor_governance_role"

  - key: "amendment_action_type"
    name: "Text Alteration Action Type"
    scientific_category: "CLOSED_ENUM"
    allowed_values:
      - "INSERTION"
      - "DELETION"
      - "SUBSTITUTION"
      - "PROBING"
    provenance_tier: "DERIVED_HUMAN_CODED"
    description: "Classification of text alteration (ingested from PhD hand-coded dataset)."
    canonical_mapping: "amendment_action_type"

  - key: "government_position"
    name: "Executive Stance during Debate"
    scientific_category: "CLOSED_ENUM"
    allowed_values:
      - "SUPPORTED"
      - "OPPOSED"
      - "NEUTRAL_NO_STANCE"
      - "MINISTERIAL_OWN_AMENDMENT"
    provenance_tier: "DERIVED_HUMAN_CODED"
    description: "Government position on opposition/backbench amendment."
    canonical_mapping: "government_position"

  - key: "disposition_canonical"
    name: "Final Amendment Disposition"
    scientific_category: "CLOSED_ENUM"
    allowed_values:
      - "AGREED_TO"
      - "DEFEATED"
      - "WITHDRAWN"
      - "NOT_MOVED"
      - "FALLEN"
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "disposition_canonical"

  - key: "decision_mechanism"
    name: "Decision Mechanism"
    scientific_category: "CLOSED_ENUM"
    allowed_values:
      - "VOICE_VOTE_UNANIMOUS"
      - "DIVISION_ROLL_CALL"
      - "WITHDRAWN_WITHOUT_VOTE"
    provenance_tier: "NATIVE_DIRECT"
    canonical_mapping: "decision_mechanism"

  - key: "party_dissent_rate_on_amendment"
    name: "Governing MSP Rebellion Rate on Amendment Division"
    scientific_category: "RESULT_DEPENDENT_DYNAMIC"
    type: "Float (0.0 to 1.0)"
    provenance_tier: "DERIVED_DETERMINISTIC"
    description: "Proportion of governing party members voting against frontbench whip on this amendment."
    canonical_mapping: "party_dissent_rate_on_amendment"
