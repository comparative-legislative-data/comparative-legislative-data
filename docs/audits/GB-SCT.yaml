jurisdiction_code: "GB-SCT"
name: "Scottish Parliament"
native_name: "Pàrlamaid na h-Alba"
location: "Holyrood, Edinburgh, Scotland"
chamber_type: "DEVOLVED_UNICAMERAL"
parliament_term: "Session 6 (2021-2026)"
official_portal_url: "https://www.parliament.scot"
api_base_url: "https://www.parliament.scot/api"

governance_context:
  government_type: "COOPERATION_AGREEMENT" # Bute House Agreement (SNP + Scottish Greens 2021-2024), single-party minority (2024-present)
  parlgov_cabinet_id: "GB-SCT-CAB-2021"
  effective_seats_total: 129
  presiding_officer_neutral_count: 1

native_data_sources:
  - id: "sct_api_bills"
    name: "Official Scottish Parliament Bills API"
    url: "https://www.parliament.scot/api/bills"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_api_msps"
    name: "Official Scottish Parliament MSP Roster API"
    url: "https://www.parliament.scot/api/members"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_api_votes"
    name: "Official Holyrood Official Report Voting Feed"
    url: "https://www.parliament.scot/api/votes"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "phd_hand_coded_amendments"
    name: "Scottish Parliament PhD Dissertation Hand-Coded Amendment Dataset"
    url: "https://doi.org/10.5281/zenodo.1234567"
    format: "CSV/Parquet"
    provenance_tier: "DERIVED_HUMAN_CODED"

institutional_variables:
  # Native Stage & Motion Variables
  - key: "stage_1_lead_committee_report_date"
    name: "Stage 1 Lead Committee Report Date"
    domain: "Stage Milestones"
    provenance_tier: "NATIVE_DIRECT"
    type: "Date (ISO 8601)"
    description: "Date of publication of the Lead Committee Stage 1 report on general principles."
    canonical_mapping: "stage_milestones[0].date_end"

  - key: "stage_1_parliament_agreement_vote_date"
    name: "Stage 1 Plenary Debate & Agreement Vote Date"
    domain: "Stage Milestones"
    provenance_tier: "NATIVE_DIRECT"
    type: "Date (ISO 8601)"
    description: "Date of formal Stage 1 debate in Chamber agreeing to general principles."
    canonical_mapping: "stage_milestones[0].date_end"

  - key: "financial_resolution_motion_flag"
    name: "Financial Resolution Motion Invoked"
    domain: "Procedural Control & Motions"
    provenance_tier: "NATIVE_DIRECT"
    type: "Boolean"
    description: "Indicates whether a separate Financial Resolution motion was required under Rule 9.12 before Stage 2."
    canonical_mapping: "financial_resolution_invoked_flag"

  - key: "emergency_bill_declaration_date"
    name: "Emergency Bill Designation Date"
    domain: "Procedural Control & Motions"
    provenance_tier: "NATIVE_DIRECT"
    type: "Date (ISO 8601)"
    description: "Date Parliament agreed under Rule 9.21 to treat the Bill as an Emergency Bill (bypassing Stage 1 committee timelines)."
    canonical_mapping: "emergency_procedure_flag"

  - key: "section_35_order_triggered_flag"
    name: "Section 35 Scotland Act Order Triggered"
    domain: "Inter-Governmental Veto"
    provenance_tier: "NATIVE_DIRECT"
    type: "Boolean"
    description: "Indicates whether Secretary of State for Scotland issued an Order under Section 35 Scotland Act 1998 preventing Royal Assent (e.g. Gender Recognition Reform Bill)."
    canonical_mapping: "inter_governmental_veto_flag"

  # Document & Size Analytics
  - key: "bill_as_introduced_word_count"
    name: "Bill Text Word Count at Introduction"
    domain: "Bill Documentation & Size"
    provenance_tier: "DERIVED_DETERMINISTIC"
    type: "Integer"
    description: "Calculated word count of official text as introduced."
    canonical_mapping: "word_count_introduced"

  - key: "bill_as_amended_stage_2_word_count"
    name: "Bill Text Word Count Post-Stage 2"
    domain: "Bill Documentation & Size"
    provenance_tier: "DERIVED_DETERMINISTIC"
    type: "Integer"
    description: "Calculated word count after Stage 2 committee amendments."
    canonical_mapping: "word_count_post_committee"

  - key: "bill_as_enacted_word_count"
    name: "Bill Text Word Count Post-Royal Assent"
    domain: "Bill Documentation & Size"
    provenance_tier: "DERIVED_DETERMINISTIC"
    type: "Integer"
    description: "Calculated word count of enacted Act."
    canonical_mapping: "word_count_enacted"

  # Amendments & PhD Hand-Coding
  - key: "stage_2_amendments_tabled_count"
    name: "Stage 2 Committee Amendments Tabled"
    domain: "Amendments"
    provenance_tier: "NATIVE_DIRECT"
    type: "Integer"
    description: "Total amendments lodged for committee stage consideration."
    canonical_mapping: "amendments_tabled_count"

  - key: "non_executive_amendments_government_acceptance_rate"
    name: "Non-Executive Committee Amendment Acceptance Rate"
    domain: "Amendments"
    provenance_tier: "DERIVED_HUMAN_CODED"
    type: "Float (0-1)"
    description: "Proportion of opposition/backbench amendments supported by government ministers in committee (ingested from PhD hand-coded dataset)."
    canonical_mapping: "committee_amendments_executive_acceptance_rate"

  # Roll-Call Voting & Member Affiliation
  - key: "msp_party_affiliation_at_vote_date"
    name: "MSP Party Status on Vote Date T"
    domain: "Divisions & Voting"
    provenance_tier: "DERIVED_DETERMINISTIC"
    type: "String"
    description: "Party affiliation of MSP dynamically evaluated on vote date T."
    canonical_mapping: "member_party_affiliation_at_event_date"

  - key: "party_dissent_count_stage_3_vote"
    name: "Party Backbench Rebellion Count (Stage 3 Passage)"
    domain: "Divisions & Voting"
    provenance_tier: "DERIVED_DETERMINISTIC"
    type: "Integer"
    description: "Count of governing/coalition MSPs voting against frontbench line on Stage 3 passage."
    canonical_mapping: "party_dissent_rate_at_event_date"

  # Institutional Hard Gaps
  - key: "committee_stage_2_informal_paper_gap"
    name: "Committee Stage 2 Informal Draft Notes Gap"
    domain: "Institutional Hard Gaps"
    provenance_tier: "UNAVAILABLE_HARD_GAP"
    hard_gap_reason: "RECORDED_BUT_UNDIGITIZED"
    type: "Null"
    description: "Informal Stage 2 committee working notes are not published in open API format."
    canonical_mapping: "null"
