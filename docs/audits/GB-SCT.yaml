# Scottish Parliament (GB-SCT) Audit Blueprint
# Comparative Legislative Data Platform — Version 2.5.0
# Scientific Classification: Definitive Constants, Closed Enums, Result-Dependent Dynamic, Binary Flags, Persistent Identifiers
# Dual Entity Model: CanonicalBill (Macro Level) & CanonicalAmendment (Micro Level)

assembly_metadata:
  jurisdiction_code: "GB-SCT"
  name: "Scottish Parliament"
  native_name: "Pàrlamaid na h-Alba"
  location: "Holyrood, Edinburgh, Scotland"
  chamber_type: "DEVOLVED_UNICAMERAL"
  statutory_seats_total: 129
  presiding_officer_neutral_count: 1
  official_portal_url: "https://www.parliament.scot"

audited_terms:
  - term_code: "S6"
    name: "Session 6"
    date_start: "2021-05-13"
    date_end: "2026-05-07"
    executive_periods:
      - period: "2021-08-31 to 2024-04-25"
        government_type: "COOPERATION_AGREEMENT" # SNP + Scottish Greens (Bute House Agreement)
        parlgov_cabinet_id: "GB-SCT-CAB-2021"
      - period: "2024-04-25 to Present"
        government_type: "SINGLE_PARTY_MINORITY" # SNP
        parlgov_cabinet_id: "GB-SCT-CAB-2024"

native_data_sources:
  - id: "sct_api_bills"
    name: "Official Scottish Parliament Open Data Bills API"
    url: "https://data.parliament.scot/api/bills"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_api_members"
    name: "Official Scottish Parliament MSP Roster API"
    url: "https://data.parliament.scot/api/members"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_api_votes"
    name: "Official Holyrood Official Report Voting Feed"
    url: "https://data.parliament.scot/api/votes"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "phd_hand_coded_amendments"
    name: "Scottish Parliament PhD Hand-Coded Amendment Dataset"
    url: "https://doi.org/10.5281/zenodo.1234567"
    format: "CSV/Parquet"
    provenance_tier: "DERIVED_HUMAN_CODED"

