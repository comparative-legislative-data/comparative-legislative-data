# Scottish Parliament (GB-SCT) Audit Blueprint
# Comparative Legislative Data Platform — Version 2.8.0 Baseline (Pending Formal Audit)
# Scientific Classification: Definitive Constants, Closed Enums, Result-Dependent Dynamic, Binary Flags, Persistent Identifiers
# Multi-Entity Model: CanonicalBill (Macro Level), CanonicalAmendment (Micro Level), CommitteeContext (Roster Level), ParsedProceedings (Hansard Text)
# Note: All provenance tiers are set to NOT_YET_CATEGORISED pending the standalone formal audit exercise.

assembly_metadata:
  jurisdiction_code: "GB-SCT"
  name: "Scottish Parliament"
  native_name: "Pàrlamaid na h-Alba"
  location: "Holyrood, Edinburgh, Scotland"
  chamber_type: "DEVOLVED_UNICAMERAL"
  statutory_seats_total: 129
  presiding_officer_neutral_count: 1
  official_portal_url: "https://www.parliament.scot"

audited_terms:
  - term_code: "S6"
    name: "Session 6"
    date_start: "2021-05-13"
    date_end: "2026-05-07"
    executive_periods:
      - period: "2021-08-31 to 2024-04-25"
        devolved_executive_name: "Scottish Government"
        government_type: "COOPERATION_AGREEMENT" # SNP + Scottish Greens (Bute House Agreement)
        governing_parties: ["SNP", "Scottish Greens"]
        parlgov_cabinet_id: "GB-SCT-CAB-2021"
      - period: "2024-04-25 to Present"
        devolved_executive_name: "Scottish Government"
        government_type: "SINGLE_PARTY_MINORITY" # SNP
        governing_parties: ["SNP"]
        parlgov_cabinet_id: "GB-SCT-CAB-2024"

native_data_sources:
  - id: "sct_api_bills"
    name: "Official Scottish Parliament Open Data Bills API"
    url: "https://data.parliament.scot/api/bills"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_api_members"
    name: "Official Scottish Parliament MSP Roster API"
    url: "https://data.parliament.scot/api/members"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_api_member_parties"
    name: "Official MSP Temporal Party Affiliations API"
    url: "https://data.parliament.scot/api/memberparties"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_api_person_committee_roles"
    name: "Official MSP Committee Memberships & Convener Roles API"
    url: "https://data.parliament.scot/api/PersonCommitteeRoles"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_api_member_gov_roles"
    name: "Official Ministerial Government Portfolios API"
    url: "https://data.parliament.scot/api/MemberGovernmentRoles"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_api_sessions"
    name: "Official Parliamentary Term Registry API"
    url: "https://data.parliament.scot/api/sessions"
    format: "JSON"
    provenance_tier: "NATIVE_DIRECT"
  - id: "sct_plenary_chamber_votes"
    name: "Holyrood Official Report Plenary Chamber Voting Logs"
    url: "https://www.parliament.scot/chamber-and-committees/votes"
    format: "HTML/JSON"
    provenance_tier: "NATIVE_DIRECT"

