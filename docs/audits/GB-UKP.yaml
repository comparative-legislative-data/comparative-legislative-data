schema_version: "1.0.0"
last_updated: "2026-07-22"

assembly:
  jurisdiction_code: "GB-UKP"
  name: "UK Parliament (Westminster)"
  location: "London, Westminster"
  chamber_type: "SOVEREIGN_BICAMERAL"
  official_portal_url: "https://bills.parliament.uk"
  license_type: "Open Parliament Licence v3.0 / OGL v3.0"
  target_cohort: "2019-2024 BICD Cohort 1"

endpoints:
  - name: "Bills Search API"
    url: "https://bills-api.parliament.uk/api/v1/Bills"
    http_method: "GET"
    auth_required: false
    rate_limit_per_min: 600
    response_format: "JSON"
    pagination_mechanism: "skip/take"
  - name: "Bill Details API"
    url: "https://bills-api.parliament.uk/api/v1/Bills/{id}"
    http_method: "GET"
    auth_required: false
    rate_limit_per_min: 600
    response_format: "JSON"
  - name: "Bill Stages API"
    url: "https://bills-api.parliament.uk/api/v1/Bills/{id}/Stages"
    http_method: "GET"
    auth_required: false
    rate_limit_per_min: 600
    response_format: "JSON"

field_mappings:
  - canonical_field: "normalized.title"
    native_key: "shortTitle"
    provenance_tier: "NATIVE_DIRECT"
    derivation_confidence: "HIGH"
  - canonical_field: "normalized.parliament_term"
    native_key: "session.name"
    provenance_tier: "ENRICHED_BY_PIPELINE"
    derivation_confidence: "HIGH"
    notes: "Mapped from session range (e.g. 2019-2021 Session -> 58th Parliament)"
  - canonical_field: "normalized.initiator_type"
    native_key: "billWithdrawn"
    provenance_tier: "ENRICHED_BY_PIPELINE"
    derivation_confidence: "HIGH"
    notes: "Derived from member sponsor party & minister role join against Executive Roster"
  - canonical_field: "normalized.final_status"
    native_key: "currentStage.stageName"
    provenance_tier: "ENRICHED_BY_PIPELINE"
    derivation_confidence: "HIGH"
    notes: "Mapped from stage name (e.g. Royal Assent -> ENACTED)"
  - canonical_field: "normalized.termination_mechanism"
    native_key: "isAct"
    provenance_tier: "ENRICHED_BY_PIPELINE"
    derivation_confidence: "HIGH"

hansard:
  transcript_format: "REST API / XML"
  speaker_disambiguation_method: "Member ID (api.parliament.uk/members/{id})"
  timestamp_granularity: "SPEECH_LEVEL"
  interruption_flags_available: true

typology_tests:
  - bill_id: "381"
    title: "European Union (Withdrawal Agreement) Act 2020"
    typology_category: "Fast-Track Executive Bill"
    expected_stages_count: 8
    notes: "Passed in 28 calendar days across Commons and Lords."
  - bill_id: "2783"
    title: "High Speed Rail (Crewe - Manchester) Bill"
    typology_category: "Hybrid Bill"
    expected_stages_count: 12
    notes: "Carried over across sessions."

procedural_notes:
  - "Bicameral progression: Bills originate in Commons or Lords and must pass both chambers identical text."
  - "Money Bills carry Speaker certification under Parliament Act 1911."
